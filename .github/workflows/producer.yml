name: Kafka Producer

on:
  workflow_dispatch:   # manual trigger
  # schedule:          # uncomment to run automatically
  #   - cron: '*/30 * * * *'

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Kafka certificates (exact copy)
        run: |
          mkdir -p certs
          cat <<'CERTEOF' > certs/ca.pem
          ${{ secrets.KAFKA_CA_CERT }}
          CERTEOF
          cat <<'CERTEOF' > certs/service.cert
          ${{ secrets.KAFKA_SERVICE_CERT }}
          CERTEOF
          cat <<'CERTEOF' > certs/service.key
          ${{ secrets.KAFKA_SERVICE_KEY }}
          CERTEOF
          chmod 600 certs/*

      - name: Test Kafka SSL connectivity
        run: |
          openssl s_client -connect farud-detection-ariyanshaw143-b9ee.k.aivencloud.com:17043 \
            -CAfile certs/ca.pem -cert certs/service.cert -key certs/service.key \
            -state -nbio 2>&1 | head -30

      - name: Run producer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MAX_MESSAGES: ${{ vars.MAX_MESSAGES || '5000' }}
          DELAY: ${{ vars.DELAY || '0.1' }}
          GDRIVE_FILE_ID: ${{ vars.GDRIVE_FILE_ID }}
        run: python kafka_producer.py
