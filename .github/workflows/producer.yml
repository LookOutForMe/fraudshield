name: Kafka Producer

on:
  workflow_dispatch:   # manual trigger
  # schedule:
  #   - cron: '*/30 * * * *'

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decode Kafka certificates from base64
        run: |
          mkdir -p certs
          echo "${{ secrets.KAFKA_CA_CERT_BASE64 }}" | base64 -d > certs/ca.pem
          echo "${{ secrets.KAFKA_SERVICE_CERT_BASE64 }}" | base64 -d > certs/service.cert
          echo "${{ secrets.KAFKA_SERVICE_KEY_BASE64 }}" | base64 -d > certs/service.key
          chmod 600 certs/*
          echo "--- Certificate sizes ---"
          wc -c certs/*
          echo "--- First line of ca.pem ---"
          head -1 certs/ca.pem

      - name: Test network reachability to Kafka
        run: |
          echo "Testing TCP connection (10s timeout)"
          timeout 10 bash -c 'echo >/dev/tcp/farud-detection-ariyanshaw143-b9ee.k.aivencloud.com/17043 && echo "Port is OPEN" || echo "Port is CLOSED"' || echo "Connection timed out or blocked"

      - name: Test Kafka SSL handshake
        run: |
          openssl s_client -connect farud-detection-ariyanshaw143-b9ee.k.aivencloud.com:17043 \
            -CAfile certs/ca.pem -cert certs/service.cert -key certs/service.key \
            -state -nbio 2>&1 | head -30

      - name: Run producer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MAX_MESSAGES: ${{ vars.MAX_MESSAGES || '5000' }}
          DELAY: ${{ vars.DELAY || '0.1' }}
          GDRIVE_FILE_ID: ${{ vars.GDRIVE_FILE_ID }}
        run: python kafka_producer.py
